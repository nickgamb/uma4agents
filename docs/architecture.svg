<svg viewBox="0 0 1200 790" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5b8cff"/><stop offset="1" stop-color="#8f6bff"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.75" cy="0" r="0.8">
      <stop offset="0" stop-color="#5b8cff" stop-opacity="0.10"/><stop offset="1" stop-color="#5b8cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.05" cy="1" r="0.7">
      <stop offset="0" stop-color="#8f6bff" stop-opacity="0.08"/><stop offset="1" stop-color="#8f6bff" stop-opacity="0"/>
    </radialGradient>
    <marker id="mAccent" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5b8cff"/>
    </marker>
    <marker id="mGreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2ed079"/>
    </marker>
    <marker id="mWarn" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#f2b955"/>
    </marker>
    <marker id="mDim" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#616c85"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="1200" height="790" fill="#080a0f"/>
  <rect width="1200" height="790" fill="url(#glow1)"/>
  <rect width="1200" height="790" fill="url(#glow2)"/>

  <!-- header -->
  <rect x="40" y="26" width="34" height="34" rx="9" fill="url(#mark)"/>
  <text x="57" y="49" text-anchor="middle" fill="#ffffff" font-size="17" font-weight="800">M</text>
  <text x="88" y="42" fill="#eef1f7" font-size="17" font-weight="650">UMA for Agents</text>
  <text x="88" y="60" fill="#9aa4ba" font-size="12">How a requesting agent earns access to Alice's accounts — at a glance</text>
  <text x="1160" y="42" text-anchor="end" fill="#616c85" font-size="11" font-family="ui-monospace, 'SF Mono', Menlo, monospace">UMA 2.0 · AAuth PoP · MyTerms (IEEE 7012)</text>

  <!-- ======================= GRANT PLANE ======================= -->
  <text x="40" y="104" fill="#616c85" font-size="10" letter-spacing="2" font-weight="600">GRANT PLANE — NEGOTIATION</text>

  <!-- Bob card -->
  <rect x="40" y="118" width="310" height="172" rx="14" fill="#0f131c" stroke="#232c3d"/>
  <text x="58" y="140" fill="#616c85" font-size="10" letter-spacing="1.6" font-weight="600">BOB'S SIDE · REQUESTING PARTY</text>
  <text x="58" y="161" fill="#eef1f7" font-size="14" font-weight="650">Bob's Agent</text>
  <text x="58" y="177" fill="#9aa4ba" font-size="11">Claude, Claude Code, any MCP client — unmodified</text>
  <rect x="56" y="190" width="278" height="84" rx="9" fill="#151b26" stroke="#232c3d"/>
  <text x="70" y="209" fill="#5b8cff" font-size="12" font-weight="620">agent-shim</text>
  <text x="70" y="226" fill="#9aa4ba" font-size="10.5">Ed25519 key · signs requests (RFC 9421)</text>
  <text x="70" y="241" fill="#9aa4ba" font-size="10.5">runs the grant dance · elicits terms to Bob</text>
  <text x="70" y="256" fill="#9aa4ba" font-size="10.5">holds signed receipts</text>
  <text x="70" y="269" fill="#616c85" font-size="9.5" font-family="ui-monospace, Menlo, monospace">~/.uma4agents/receipts/</text>

  <!-- Alice AS card -->
  <rect x="870" y="112" width="290" height="190" rx="14" fill="#0f131c" stroke="#232c3d"/>
  <text x="886" y="133" fill="#616c85" font-size="10" letter-spacing="1.6" font-weight="600">ALICE'S SIDE · AUTHORIZATION SERVER</text>
  <text x="886" y="154" fill="#eef1f7" font-size="14" font-weight="650">uma-as</text>
  <text x="886" y="169" fill="#616c85" font-size="10" font-family="ui-monospace, Menlo, monospace">alice-as.uma.lab · Keycloak identity</text>
  <rect x="886" y="178" width="258" height="34" rx="8" fill="#151b26" stroke="#232c3d"/>
  <text x="898" y="192" fill="#eef1f7" font-size="10.5" font-weight="600">MyTerms roster — /terms</text>
  <text x="898" y="205" fill="#9aa4ba" font-size="9.5">proffer · agree · identical dual receipts (IEEE 7012)</text>
  <rect x="886" y="218" width="258" height="34" rx="8" fill="#151b26" stroke="#232c3d"/>
  <text x="898" y="232" fill="#eef1f7" font-size="10.5" font-weight="600">tickets → agreements → PoP RPTs</text>
  <text x="898" y="245" fill="#9aa4ba" font-size="9.5">request_submitted holds · introspect · consume</text>
  <rect x="886" y="258" width="258" height="34" rx="8" fill="#151b26" stroke="#232c3d"/>
  <text x="898" y="272" fill="#eef1f7" font-size="10.5" font-weight="600">connections (key thumbprint) · ledger</text>
  <text x="898" y="285" fill="#9aa4ba" font-size="9.5">policy tiers · revocation kills live grants</text>

  <!-- grant beats: Bob <-> AS -->
  <text x="360" y="158" fill="#5b8cff" font-size="11" font-weight="600">② present ticket at /token</text>
  <line x1="355" y1="166" x2="862" y2="166" stroke="#5b8cff" stroke-width="1.6" marker-end="url(#mAccent)"/>
  <text x="360" y="188" fill="#7f9bd8" font-size="10.5">terms proffered — MyTerms template (purpose · scope · expiry · prohibited)</text>
  <line x1="862" y1="196" x2="358" y2="196" stroke="#5b8cff" stroke-width="1.2" stroke-dasharray="5 4" opacity="0.75" marker-end="url(#mAccent)"/>
  <text x="360" y="216" fill="#5b8cff" font-size="11" font-weight="600">③ commit signed agreement — JWS naming its terms_uri</text>
  <line x1="355" y1="224" x2="862" y2="224" stroke="#5b8cff" stroke-width="1.6" marker-end="url(#mAccent)"/>
  <text x="360" y="245" fill="#2ed079" font-size="11" font-weight="600">④ grant — PoP RPT (operation-bound · single-use) + dual-signed receipt</text>
  <line x1="862" y1="253" x2="358" y2="253" stroke="#2ed079" stroke-width="1.6" marker-end="url(#mGreen)"/>

  <!-- Portal card -->
  <rect x="870" y="352" width="290" height="142" rx="14" fill="#0f131c" stroke="#232c3d"/>
  <text x="886" y="373" fill="#616c85" font-size="10" letter-spacing="1.6" font-weight="600">ALICE'S SURFACE</text>
  <text x="886" y="394" fill="#eef1f7" font-size="14" font-weight="650">Meridian Portal</text>
  <text x="886" y="409" fill="#616c85" font-size="10" font-family="ui-monospace, Menlo, monospace">portal.uma.lab</text>
  <text x="886" y="428" fill="#9aa4ba" font-size="11">Dashboard · Holdings · Trade</text>
  <rect x="886" y="438" width="258" height="40" rx="8" fill="#151b26" stroke="#232c3d"/>
  <text x="898" y="454" fill="#eef1f7" font-size="10.5" font-weight="600">Settings ▸ Security ▸ Agent Authorization</text>
  <text x="898" y="468" fill="#9aa4ba" font-size="9.5">Approvals · Connected agents · My Terms · Ledger</text>

  <!-- AS <-> portal -->
  <line x1="930" y1="302" x2="930" y2="348" stroke="#f2b955" stroke-width="1.6" marker-end="url(#mWarn)"/>
  <text x="922" y="318" text-anchor="end" fill="#f2b955" font-size="10">new agent / ask-me pends</text>
  <text x="922" y="331" text-anchor="end" fill="#f2b955" font-size="10" opacity="0.8">buzz → portal (SSE)</text>
  <line x1="1100" y1="348" x2="1100" y2="306" stroke="#2ed079" stroke-width="1.6" marker-end="url(#mGreen)"/>
  <text x="1108" y="322" fill="#2ed079" font-size="10">approve / deny</text>
  <text x="1108" y="335" fill="#2ed079" font-size="10" opacity="0.8">revoke</text>

  <!-- ======================= divider ======================= -->
  <line x1="40" y1="530" x2="1160" y2="530" stroke="#232c3d" stroke-dasharray="3 5"/>
  <text x="40" y="552" fill="#616c85" font-size="10" letter-spacing="2" font-weight="600">DATA PLANE — EVERY CALL ENFORCED AT THE GATEWAY</text>

  <!-- Bob -> gateway verticals -->
  <line x1="95" y1="290" x2="95" y2="562" stroke="#5b8cff" stroke-width="1.6" marker-end="url(#mAccent)"/>
  <line x1="130" y1="290" x2="130" y2="562" stroke="#2ed079" stroke-width="1.6" marker-end="url(#mGreen)"/>
  <rect x="158" y="380" width="216" height="96" rx="9" fill="#0d1119" stroke="#232c3d"/>
  <line x1="95" y1="399" x2="158" y2="399" stroke="#5b8cff" stroke-width="1" opacity="0.5"/>
  <text x="170" y="403" fill="#5b8cff" font-size="11" font-weight="600">① tools/call — unauthorized</text>
  <text x="170" y="418" fill="#7f9bd8" font-size="10">← 401 WWW-Authenticate: UMA</text>
  <text x="170" y="431" fill="#616c85" font-size="9.5" font-family="ui-monospace, Menlo, monospace">ticket + as_uri</text>
  <line x1="130" y1="450" x2="158" y2="450" stroke="#2ed079" stroke-width="1" opacity="0.5"/>
  <text x="170" y="454" fill="#2ed079" font-size="11" font-weight="600">signed retry with the grant</text>
  <text x="170" y="468" fill="#67c795" font-size="10">RFC 9421 signature + PoP RPT</text>

  <!-- Gateway card -->
  <rect x="40" y="566" width="340" height="168" rx="14" fill="#0f131c" stroke="#232c3d"/>
  <text x="58" y="587" fill="#616c85" font-size="10" letter-spacing="1.6" font-weight="600">RESOURCE SIDE · PEP</text>
  <text x="58" y="608" fill="#eef1f7" font-size="14" font-weight="650">agentgateway + uma-pep</text>
  <text x="58" y="623" fill="#616c85" font-size="10" font-family="ui-monospace, Menlo, monospace">gateway.uma.lab/mcp · holds Alice's PAT</text>
  <rect x="56" y="634" width="308" height="86" rx="9" fill="#151b26" stroke="#232c3d"/>
  <text x="70" y="652" fill="#9aa4ba" font-size="10.5">challenge unauthorized calls · 401 + fresh ticket</text>
  <text x="70" y="668" fill="#9aa4ba" font-size="10.5">introspect RPT · verify proof-of-possession</text>
  <text x="70" y="684" fill="#9aa4ba" font-size="10.5">enforce single-use operation hash</text>
  <text x="70" y="702" fill="#616c85" font-size="9.5" font-family="ui-monospace, Menlo, monospace">/.well-known/oauth-protected-resource (RFC 9728)</text>

  <!-- Vault card -->
  <rect x="860" y="586" width="300" height="126" rx="14" fill="#0f131c" stroke="#232c3d"/>
  <text x="876" y="607" fill="#616c85" font-size="10" letter-spacing="1.6" font-weight="600">ALICE'S DATA</text>
  <text x="876" y="628" fill="#eef1f7" font-size="14" font-weight="650">alice-vault-mcp</text>
  <text x="876" y="645" fill="#9aa4ba" font-size="11">unmodified MCP server — zero auth code</text>
  <text x="876" y="668" fill="#616c85" font-size="10.5" font-family="ui-monospace, Menlo, monospace">get_positions · get_transactions</text>
  <text x="876" y="683" fill="#616c85" font-size="10.5" font-family="ui-monospace, Menlo, monospace">execute_trade</text>

  <!-- gateway -> vault -->
  <text x="618" y="640" text-anchor="middle" fill="#2ed079" font-size="11" font-weight="600">allowed → data</text>
  <line x1="386" y1="650" x2="854" y2="650" stroke="#2ed079" stroke-width="1.6" marker-end="url(#mGreen)"/>
  <text x="618" y="668" text-anchor="middle" fill="#616c85" font-size="9.5" font-family="ui-monospace, Menlo, monospace">MCP streamable-http</text>

  <!-- gateway -> AS (protection API) -->
  <path d="M386,592 H772 V286 H866" fill="none" stroke="#616c85" stroke-width="1.2" stroke-dasharray="4 4" marker-end="url(#mDim)"/>
  <text x="762" y="580" text-anchor="end" fill="#616c85" font-size="10" font-family="ui-monospace, Menlo, monospace">PAT · /rreg · /perm · introspect</text>

  <!-- footer -->
  <text x="600" y="768" text-anchor="middle" fill="#616c85" font-size="10.5" font-family="ui-monospace, 'SF Mono', Menlo, monospace">UMA 2.0 — uma-ticket grant · request_submitted    |    AAuth — aa-auth+jwt · RFC 9421 proof-of-possession    |    MyTerms — IEEE Std 7012-2025 · proffered terms · dual receipts</text>
</svg>

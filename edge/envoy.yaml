# Edge proxy: one TLS front door for every *.uma.lab hostname (SNI/Host routed).
# Certificates come from make init (mkcert local CA).
admin:
  address:
    socket_address: { address: 127.0.0.1, port_value: 9901 }

static_resources:
  listeners:
    - address:
        socket_address: { address: 0.0.0.0, port_value: 443 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                codec_type: AUTO
                stat_prefix: edge_https
                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                route_config:
                  name: edge_routes
                  virtual_hosts:
                    - name: alice-as
                      domains: ["alice-as.uma.lab", "alice-as.uma.lab:*"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: uma_as }
                    - name: keycloak
                      domains: ["keycloak.uma.lab", "keycloak.uma.lab:*"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: keycloak }
                    - name: gateway
                      domains: ["gateway.uma.lab", "gateway.uma.lab:*"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: agentgateway }
                    - name: portal
                      domains: ["portal.uma.lab", "portal.uma.lab:*"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: alice_portal }
                    - name: grafana
                      domains: ["grafana.uma.lab", "grafana.uma.lab:*"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: grafana }
                    - name: ps
                      domains: ["ps.uma.lab", "ps.uma.lab:*"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: person_server }
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
          transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
              common_tls_context:
                tls_certificates:
                  - certificate_chain: { filename: "/certs/edge-server.pem" }
                    private_key: { filename: "/certs/edge-server-key.pem" }

  clusters:
    - name: uma_as
      type: STRICT_DNS
      load_assignment:
        cluster_name: uma_as
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address: { socket_address: { address: uma-as, port_value: 9000 } }
    - name: keycloak
      type: STRICT_DNS
      load_assignment:
        cluster_name: keycloak
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address: { socket_address: { address: keycloak, port_value: 8080 } }
    - name: agentgateway
      type: STRICT_DNS
      load_assignment:
        cluster_name: agentgateway
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address: { socket_address: { address: agentgateway, port_value: 3000 } }
    - name: alice_portal
      type: STRICT_DNS
      load_assignment:
        cluster_name: alice_portal
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address: { socket_address: { address: alice-portal, port_value: 9010 } }
    - name: grafana
      type: STRICT_DNS
      load_assignment:
        cluster_name: grafana
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address: { socket_address: { address: grafana, port_value: 3000 } }
    - name: person_server
      type: STRICT_DNS
      load_assignment:
        cluster_name: person_server
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address: { socket_address: { address: person-server, port_value: 8765 } }
